<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - FarmaEduk</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="stylesheet" href="/css/style-login.css" />
  </head>
  <body>
    <div class="background-decoration"></div>

    <main class="auth-card">
      <section class="auth-form">
        <div class="form-header">
          <h1 class="form-title">Criar Conta</h1>
          <p class="form-subtitle">cadastre o nome do aluno e o usuario de acesso</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">badge</span>
              <input
                type="text"
                id="registerNomeAluno"
                class="form-input"
                placeholder="Nome do aluno"
                autocomplete="name"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">person</span>
              <input
                type="text"
                id="registerNome"
                class="form-input"
                placeholder="Nome de usuario para login"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">lock</span>
              <input
                type="password"
                id="registerSenha"
                class="form-input"
                placeholder="Senha"
                autocomplete="new-password"
                required
              />
            </div>
          </div>

          <p id="registerFeedback" class="feedback" role="alert"></p>
          <button type="submit" class="submit-button">CADASTRAR</button>
        </form>

        <div class="actions-secondary">
          <a href="/medicamentos" class="btn-action">Voltar</a>
          <a href="/login" class="btn-action">Sair</a>
        </div>
      </section>
    </main>

    <script src="/js/script-cadastro.js"></script>
  </body>
</html>
