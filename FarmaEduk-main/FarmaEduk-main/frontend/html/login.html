<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso - FarmaEduk</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="stylesheet" href="/css/style-login.css" />
  </head>
  <body>
    <div class="background-decoration"></div>

    <main class="auth-card">
      <section class="auth-form">
        <div class="form-header">
          <h1 class="form-title">FarmaEduk</h1>
          <p class="form-subtitle">Escolha como deseja acessar o sistema</p>
        </div>

        <div class="access-options" aria-label="Opcoes de acesso">
          <a class="access-card" href="/login-admin">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <strong>PROFESSOR</strong>
            <small>Acesso completo ao sistema</small>
          </a>
          <a class="access-card" href="/login-aluno">
            <span class="material-symbols-outlined">school</span>
            <strong>ALUNO</strong>
            <small>Consulta dos proprios registros</small>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
